<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost AI – Analysis</title>
    <meta name="description" content="Analyse your chess games with Stockfish – get move classifications, accuracy scores, and detailed breakdowns">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Source+Code+Pro:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0f0f0f;
            --panel:      #1c1c1c;
            --panel2:     #242424;
            --border:     #333;
            --gold:       #c9a84c;
            --gold-dim:   #8a6e2e;
            --text:       #e0e0e0;
            --text-dim:   #888;
            --brilliant:  #1baca6;
            --great:      #5c8bb0;
            --best:       #81b64c;
            --excellent:  #a8c050;
            --good:       #95bb4a;
            --inaccuracy: #f3ae16;
            --mistake:    #f78d1f;
            --miss:       #ff7769;
            --blunder:    #fa412d;
            --radius:     10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 14px;
            overflow-y: auto !important;
            overflow-x: clip !important;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .page-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1320px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .top-bar h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 22px;
            letter-spacing: 3px;
            flex: 1;
        }

        .btn {
            padding: 9px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-family: 'Source Code Pro', monospace;
            font-size: 13px;
            font-weight: 600;
            color: white;
            transition: background 0.18s, transform 0.1s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: #2e2e2e; border: 1px solid #444; }
        .btn-secondary:hover { background: #3a3a3a; border-color: var(--gold-dim); }
        .btn-gold { background: var(--gold); color: #111; font-weight: 700; }
        .btn-gold:hover { background: #d4b55a; }
        .btn-gold:disabled { background: #555; color: #888; cursor: not-allowed; }

        .pgn-section {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .pgn-section label {
            display: block;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .pgn-section textarea {
            width: 100%;
            height: 110px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Source Code Pro', monospace;
            font-size: 12px;
            padding: 12px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        .pgn-section textarea:focus { border-color: var(--gold-dim); }

        .pgn-controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .depth-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            font-size: 13px;
        }
        .depth-wrap select {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }

        .status-msg {
            margin-left: auto;
            font-size: 13px;
            color: var(--text-dim);
            font-style: italic;
        }

        .analysis-layout {
            display: flex;
            gap: 18px;
            align-items: stretch;
        }

        .board-col {
            flex: 0 0 auto;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            height: fit-content;
        }

        #analysis-board {
            width: min(calc(100vh - 180px), calc(100vw - 520px)) !important;
            height: min(calc(100vh - 180px), calc(100vw - 520px)) !important;
            aspect-ratio: 1/1;
        }

        /* ── Click-To-Move Highlights ── */
        .selected-square { background-color: rgba(255,255,255,0.08) !important; box-shadow: inset 0 0 10px 3px var(--gold) !important; }
        .legal-highlight { background-color: rgba(201,168,76,0.12) !important; box-shadow: inset 0 0 0 3px rgba(201,168,76,0.35) !important; }
        .last-move-from, .last-move-to { background-color: rgba(201,168,76,0.13) !important; }
        .check-square { background-color: rgba(255,40,40,0.5) !important; box-shadow: inset 0 0 16px 6px rgba(139,0,0,0.8) !important; }

        /* ── Inline Horizontal Promotion Menu ── */
        .promo-backdrop {
            position: fixed; inset: 0; z-index: 9998; background: transparent; display: none;
        }
        .inline-promo {
            position: absolute; display: none; flex-direction: row; background: var(--panel2);
            border: 2px solid var(--gold); border-radius: 8px; box-shadow: 0 12px 30px rgba(0,0,0,0.8);
            z-index: 9999; padding: 5px; gap: 5px; animation: pop-in 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes pop-in {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .inline-promo-piece {
            width: 48px; height: 48px; background: #111; border: 1px solid var(--border);
            border-radius: 6px; cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .inline-promo-piece:hover { background: #242010; border-color: var(--gold); transform: scale(1.08); }
        .inline-promo-piece img { width: 40px; height: 40px; pointer-events: none; }

        .player-strip {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .player-name {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .nav-strip {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }
        .nav-btn {
            width: 44px; height: 44px;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            font-size: 18px;
        }
        .nav-btn:hover { background: #2e2e2e; color: var(--gold); border-color: var(--gold-dim); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .eval-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .eval-label { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
        .eval-bar-outer {
            width: 28px;
            height: min(calc(100vh - 200px), calc(100vw - 540px));
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .eval-bar-black { background: #222; transition: flex 0.5s ease; }
        .eval-bar-white { background: #e8e8e8; transition: flex 0.5s ease; }
        .eval-score { font-family: 'Source Code Pro', monospace; font-size: 11px; color: var(--text-dim); text-align: center; }

        .right-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(min(calc(100vh - 180px), calc(100vw - 520px)) + 50px);
        }

        .move-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
        }
        .move-card-title {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .current-move-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .move-badge { font-family: 'Source Code Pro', monospace; font-size: 18px; font-weight: 600; color: var(--text); }
        .classification-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .best-move-hint { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
        .best-move-hint span { color: var(--best); font-family: 'Source Code Pro', monospace; font-weight: 600; }

        .move-list-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .move-list-header {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .move-list-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 8px 0;
        }
        .move-list-scroll::-webkit-scrollbar { width: 4px; }
        .move-list-scroll::-webkit-scrollbar-track { background: transparent; }
        .move-list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .move-row { display: grid; grid-template-columns: 32px 1fr 1fr; gap: 2px; padding: 1px 8px; }
        .move-num { font-size: 10px; color: var(--gold-dim); font-family: 'Source Code Pro', monospace; padding: 6px 4px; text-align: right; }
        .move-cell {
            font-family: 'Source Code Pro', monospace;
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.12s;
            color: var(--text);
        }
        .move-cell:hover { background: rgba(255,255,255,0.06); }
        .move-cell.active { background: rgba(201,168,76,0.15); color: var(--gold); }

        .move-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        .accuracy-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
        .accuracy-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
        .accuracy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .accuracy-side { display: flex; flex-direction: column; gap: 4px; }
        .accuracy-side-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
        .accuracy-counts { display: flex; gap: 6px; flex-wrap: wrap; }

        .accuracy-score-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .accuracy-pct {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            min-width: 64px;
        }
        .accuracy-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .accuracy-bar-fill { height: 100%; border-radius: 3px; background: var(--gold); transition: width 0.6s ease; }

        .icon-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 50%;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 11px;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .icon-brilliant { background: var(--brilliant); }
        .icon-great     { background: var(--great); }
        .icon-best      { background: var(--best); }
        .icon-excellent { background: var(--excellent); font-size: 10px; }
        .icon-good      { background: var(--good); font-size: 10px; }
        .icon-inaccuracy{ background: var(--inaccuracy); }
        .icon-miss      { background: var(--miss); font-size: 12px; }
        .icon-mistake   { background: var(--mistake); font-size: 14px; }
        .icon-blunder   { background: var(--blunder); }

        .acc-pill {
            display: flex;
            align-items: center;
            font-size: 13px;
            padding: 4px 10px 4px 4px;
            border-radius: 12px;
            background: transparent;
            color: var(--text-dim);
            font-family: 'DM Sans', sans-serif;
        }
        .acc-count { font-weight: 700; color: var(--text); margin-right: 4px; }
        .pill-brilliant { background: rgba(27,172,166,0.18); color: var(--brilliant); border: 1px solid rgba(27,172,166,0.3); }

        .dot-brilliant  { background: var(--brilliant); box-shadow: 0 0 5px var(--brilliant); }
        .dot-great      { background: var(--great); }
        .dot-best       { background: var(--best); }
        .dot-excellent  { background: var(--excellent); }
        .dot-good       { background: var(--good); }
        .dot-inaccuracy { background: var(--inaccuracy); }
        .dot-miss       { background: var(--miss); }
        .dot-mistake    { background: var(--mistake); }
        .dot-blunder    { background: var(--blunder); }

        .scout-progress {
            display: none;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            margin-top: 24px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            z-index: 100;
        }
        .scout-progress.visible { display: flex !important; }
        .prog-step { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 14px; }
        .prog-step.active { color: var(--text); }
        .prog-step.done { color: var(--gold); }

        .prog-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--muted); flex-shrink: 0;}
        .prog-step.active .prog-icon { border-color: var(--gold); border-top-color: transparent; animation: spin 0.8s linear infinite; }
        .prog-step.done .prog-icon { border-color: var(--gold); background: var(--gold); }
        .prog-step.done .prog-icon::after { content: '✓'; color: #000; font-size: 14px; font-weight: bold; }

        .prog-bar-wrap { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 4px; display: none; }
        .prog-bar-wrap.visible { display: block; }
        .prog-bar-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.4s ease; }

        </style>
    <!-- ── Mobile & responsive styles (analysis page) ───────────────────
         Edit ONLY this block for mobile layout changes on the analysis page.
         Contains breakpoints: ≤ 900px (tablet/phone) and ≤ 480px (small phones).
         Note: .eval-mobile-bar and .mobile-only-card defaults are also here
               since they only exist to be toggled at the 900px breakpoint.
    ─────────────────────────────────────────────────────────────────── -->
    <style>
        /* ── Mobile component defaults (toggled by media queries below) ── */
@media (max-width: 900px) {
            body { padding: 8px; }
            .top-bar h1 { font-size: 16px; }
            .pgn-section textarea { height: 80px; }
            .pgn-controls { flex-direction: column; align-items: flex-start; }
            .status-msg { margin-left: 0; }

            .analysis-layout {
                display: block !important;
                overflow: visible !important;
            }

            .board-col {
                display: block;
                width: 100%;
                background: var(--bg);
                padding: 8px 8px 6px;
                border-bottom: 1px solid var(--border);
                overflow: visible;
            }

            #analysis-board {
                width: min(calc(100vw - 32px), 420px) !important;
                height: min(calc(100vw - 32px), 420px) !important;
                margin: 0 auto;
            }

            .nav-strip { gap: 6px; justify-content: center; }
            .nav-btn { width: 44px; height: 44px; font-size: 17px; }

            .right-panel {
                display: block !important;
                width: 100% !important;
                max-height: none !important;
                height: auto !important;
                overflow: visible !important;
                padding-top: 0;
            }

            .move-card { padding: 12px 14px; margin-bottom: 10px; }

            .move-list-card {
                height: auto !important;
                min-height: 0 !important;
                display: flex !important;
                flex-direction: column !important;
                overflow: hidden !important;
                margin-bottom: 6px;
            }

            .move-list-scroll {
                flex: none !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior-x: contain;
                padding: 8px 10px !important;
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                align-items: center;
                gap: 4px;
                scrollbar-width: none;
            }
            .move-list-scroll::-webkit-scrollbar { display: none; }

            .move-row {
                display: inline-flex !important;
                flex-direction: row !important;
                align-items: center !important;
                gap: 2px !important;
                padding: 0 !important;
                flex-shrink: 0;
            }
            .move-num {
                font-size: 10px !important;
                color: var(--gold-dim) !important;
                padding: 3px 2px 3px 6px !important;
                white-space: nowrap;
            }
            .move-cell {
                display: inline-flex !important;
                align-items: center !important;
                gap: 3px !important;
                padding: 3px 8px !important;
                font-size: 12px !important;
                background: var(--panel2);
                border: 1px solid var(--border);
                border-radius: 12px !important;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .move-cell.active {
                background: rgba(201,168,76,0.2) !important;
                border-color: var(--gold-dim) !important;
                color: var(--gold) !important;
            }
            .move-cell:active { opacity: 0.7; }
            .move-dot { width: 7px !important; height: 7px !important; border-radius: 50%; flex-shrink: 0; }

            .accuracy-card {
                width: 100% !important;
                height: max-content !important;
                min-height: 220px;
                max-height: none !important;
                overflow: visible !important;
                margin-bottom: 20px;
            }

            .accuracy-grid { grid-template-columns: 1fr; gap: 8px; }
            .accuracy-pct { font-size: 16px; }
            .acc-pill { font-size: 11px; padding: 2px 6px 2px 2px; }
            .move-card-title, .accuracy-title, .move-list-header { font-size: 10px; }
            .player-strip { padding: 2px 4px; }
            .player-name { font-size: 12px; }
        }

        @media (max-width: 480px) {
            .nav-btn { width: 38px; height: 38px; font-size: 14px; }
            #analysis-board {
                width: calc(100vw - 24px) !important;
                height: calc(100vw - 24px) !important;
            }
            .move-badge { font-size: 15px; }
            .acc-pill { font-size: 10px; }

            .inline-promo-piece { width: 44px; height: 44px; }
            .inline-promo-piece img { width: 36px; height: 36px; }
        }

        .eval-mobile-bar {
            display: none;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 4px 0 8px;
        }
        .eval-score-mobile {
            font-family: 'Source Code Pro', monospace;
            font-size: 12px;
            color: var(--text-dim);
            min-width: 36px;
            text-align: center;
            flex-shrink: 0;
        }
        .eval-bar-outer-mobile {
            flex: 1;
            height: 10px;
            background: #222;
            border: 1px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }
        .eval-bar-outer-mobile .eval-bar-black {
            height: 100%;
            background: #333;
            transition: width 0.5s ease;
            flex-shrink: 0;
        }
        .eval-bar-outer-mobile .eval-bar-white {
            height: 100%;
            background: #e8e8e8;
            transition: width 0.5s ease;
            flex: 1;
        }

        .analysis-layout { flex-direction: row; }
        #eval-desktop { order: -1; }

        @media (max-width: 900px) {
            .eval-mobile-bar { display: flex; }
            #eval-desktop { display: none; }
        }

        .mobile-only-card { display: none !important; }

        @media (max-width: 900px) {
            #move-list-card-mobile {
                display: flex !important;
                width: 100%;
                flex-direction: column;
            }
            .right-panel .move-list-card { display: none !important; }
        }

        </style>
</head>
<body>
<div class="page-wrap">

    <div class="top-bar">
        <h1>ANALYSIS</h1>
        <button class="btn btn-secondary" onclick="window.location.href='/'">⬅ Home</button>
    </div>

    <div class="pgn-section">
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
            <label style="margin-bottom:0;">Paste or Upload PGN</label>
            <div>
                <input type="file" id="pgn-file-upload" accept=".pgn" style="display:none;" onchange="handleFileUpload(event)">
                <button class="btn btn-secondary" onclick="document.getElementById('pgn-file-upload').click()" style="padding:4px 10px;font-size:11px;">📁 Upload .pgn</button>
            </div>
        </div>
        <textarea id="pgn-input" placeholder='[Event "Ghost AI Game"]&#10;[White "Human"]&#10;[Black "Ghost AI"]&#10;&#10;1. e4 e5 2. Nf3 Nc6 ...'></textarea>

                                <div class="accuracy-bar-fill" id="black-acc-bar" style="width:0%"></div>

<div id="promo-backdrop" class="promo-backdrop" onclick="cancelPromotion()">
    <div id="inline-promo" class="inline-promo" onclick="event.stopPropagation()"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
let board  = null;
let exploreGame = new Chess();
let moves  = [];
let curIdx = -1;
let progressInterval = null;
let timeout1, timeout2;
let analyzeAbortController = null;

let selectedSquare = null;
let validMovesForPiece = [];
let pendingPromo = null;

// Universal Check Highlight Function
function updateCheckHighlight(chessInstance) {
    document.querySelectorAll('.check-square').forEach(sq => sq.classList.remove('check-square'));
    if (chessInstance.in_check()) {
        const turnColor = chessInstance.turn();
        const b8 = chessInstance.board();
        const files = 'abcdefgh';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const piece = b8[r][c];
                if (piece && piece.type === 'k' && piece.color === turnColor) {
                    const sq = files[c] + (8 - r);
                    const el = document.querySelector(`.square-${sq}`);
                    if (el) el.classList.add('check-square');
                    return;
                }
            }
        }
    }
}

// ── Init board ────────────────────────────────────────────────────────
function initBoard(orientation) {
    if (board) board.destroy();
    board = Chessboard('analysis-board', {
        position:    'start',
        draggable:   false, // Using click-to-move for exploration
        orientation: orientation || 'white',
        pieceTheme:  '/Chess_AI/images/{piece}.png',
    });
    exploreGame.reset();
}

// ── Click-To-Move Exploration ─────────────────────────────────────────
$(document).on('click', '.square-55d63', function () {
    if (document.getElementById('analysis-area').style.display !== 'none') {
        onSquareClick($(this).attr('data-square'));
    }
});

function onSquareClick(square) {
    if (exploreGame.game_over()) return;

    if (selectedSquare === square) {
        deselectPiece();
        return;
    }

    if (selectedSquare) {
        const moveObj = validMovesForPiece.find(m => m.to === square);

        if (moveObj) {
            const piece = exploreGame.get(selectedSquare);
            const isPromo = piece && piece.type === 'p' && (square[1] === '1' || square[1] === '8');

            if (isPromo) {
                pendingPromo = { source: selectedSquare, target: square };
                showInlinePromotion(piece.color, square);
                return;
            } else {
                finalizeAnalysisMove(selectedSquare, square, 'q');
                return;
            }
        }

        const piece = exploreGame.get(square);
        if (piece && piece.color === exploreGame.turn()) {
            selectPiece(square);
        } else {
            deselectPiece();
        }
    } else {
        const piece = exploreGame.get(square);
        if (piece && piece.color === exploreGame.turn()) {
            selectPiece(square);
        }
    }
}

function selectPiece(square) {
    deselectPiece();
    selectedSquare = square;
    validMovesForPiece = exploreGame.moves({ square: square, verbose: true });

    if (validMovesForPiece.length > 0) {
        const sqEl = document.querySelector(`.square-${square}`);
        if(sqEl) sqEl.classList.add('selected-square');
        validMovesForPiece.forEach(m => {
            const trgEl = document.querySelector(`.square-${m.to}`);
            if(trgEl) trgEl.classList.add('legal-highlight');
        });
    } else {
        selectedSquare = null;
    }
}

function deselectPiece() {
    selectedSquare = null;
    validMovesForPiece = [];
    clearSelectionHighlights();
}

function clearSelectionHighlights() {
    document.querySelectorAll('.square-55d63').forEach(sq => {
        sq.classList.remove('selected-square', 'legal-highlight');
    });
}

function showInlinePromotion(color, targetSquare) {
    const backdrop = document.getElementById('promo-backdrop');
    const container = document.getElementById('inline-promo');
    container.innerHTML = '';

    const pieces = ['q', 'n', 'r', 'b'];
    pieces.forEach(p => {
        const div = document.createElement('div');
        div.className = 'inline-promo-piece';
        div.onclick = (e) => {
            e.stopPropagation();
            submitPromotion(p);
        };
        const img = document.createElement('img');
        img.src = `/Chess_AI/images/${color}${p.toUpperCase()}.png`;
        div.appendChild(img);
        container.appendChild(div);
    });

    const sqEl = document.querySelector(`.square-${targetSquare}`);
    if (sqEl) {
        const rect = sqEl.getBoundingClientRect();

        // Hide temporarily and disable animation to get dimensions cleanly
        container.style.visibility = 'hidden';
        container.style.animation = 'none';
        container.style.display = 'flex';
        // Ensure standard piece order is preserved!
        container.style.flexDirection = 'row';

        const contRect = container.getBoundingClientRect();

        // FIX: Provide a safe fallback width.
        // If the DOM hasn't fully painted the images yet, contRect.width might fail.
        const safeWidth = contRect.width > 150 ? contRect.width : 220;
        const safeHeight = contRect.height > 40 ? contRect.height : 60;

        // Restore visibility and animation
        container.style.visibility = 'visible';
        container.style.animation = '';

        let top = rect.top - safeHeight - 8;

        const vWidth = document.documentElement.clientWidth || window.innerWidth;
        const vHeight = document.documentElement.clientHeight || window.innerHeight;

        let left;
        if (vWidth <= 900) {
            // Mobile fix: Determine physical placement
            const isPhysicallyRight = (rect.left + rect.width / 2) > (vWidth / 2);

            if (isPhysicallyRight) {
                // Align right edge of popup to right edge of square (pushes it inward to the left)
                left = rect.right - safeWidth;
            } else {
                // Align left edge of popup to left edge of square (pushes it inward to the right)
                left = rect.left;
            }
        } else {
            // Desktop: Retain exact original logic
            const file = targetSquare[0];
            const isRightSide = ['e', 'f', 'g', 'h'].includes(file);
            left = isRightSide ? (rect.right - safeWidth) : rect.left;
        }

        // --- STRICT BOUNDARY CLAMPS ---
        // Guarantees the popup never bleeds off the left or right edge of the screen
        if (left + safeWidth > vWidth - 10) {
            left = vWidth - safeWidth - 10;
        }
        if (left < 10) {
            left = 10;
        }

        // Vertical boundary clamp
        if (top < 10) top = rect.bottom + 8;
        if (top + safeHeight > vHeight - 10) top = vHeight - safeHeight - 10;

        container.style.top = top + 'px';
        container.style.left = left + 'px';
    } else {
        container.style.display = 'flex';
        container.style.flexDirection = 'row';
        container.style.top = '50%';
        container.style.left = '50%';
        container.style.transform = 'translate(-50%, -50%)';
    }
    backdrop.style.display = 'block';
}


function cancelPromotion() {
    document.getElementById('promo-backdrop').style.display = 'none';
    document.getElementById('inline-promo').style.display = 'none';
    document.getElementById('inline-promo').style.transform = '';
    pendingPromo = null;
    deselectPiece();
}

function submitPromotion(promoPiece) {
    document.getElementById('promo-backdrop').style.display = 'none';
    document.getElementById('inline-promo').style.display = 'none';
    document.getElementById('inline-promo').style.transform = '';

    if (!pendingPromo) return;
    const { source, target } = pendingPromo;
    pendingPromo = null;

    finalizeAnalysisMove(source, target, promoPiece);
}

function finalizeAnalysisMove(source, target, promo) {
    let move = exploreGame.move({
        from: source,
        to: target,
        promotion: promo
    });

    if (move) {
        board.position(exploreGame.fen(), true);
        clearSelectionHighlights();

        document.querySelectorAll('.square-55d63').forEach(sq => sq.classList.remove('last-move-from', 'last-move-to'));
        const f = document.querySelector(`.square-${source}`);
        const t = document.querySelector(`.square-${target}`);
        if(f) f.classList.add('last-move-from');
        if(t) t.classList.add('last-move-to');

        updateCheckHighlight(exploreGame);

        deselectPiece();

        clearMoveInfo();
        document.getElementById('cur-move-san').textContent = move.san;
        const pill = document.getElementById('cur-classification');
        pill.textContent = 'EXPLORE';
        pill.className = 'classification-pill';
        pill.style.background = 'transparent';
        pill.style.border = '1px solid var(--border)';
        pill.style.color = 'var(--text-dim)';

        document.querySelectorAll('.move-cell').forEach(el => el.classList.remove('active'));

        fetch('/evaluate_fen', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({fen: exploreGame.fen()})
        }).then(r => r.json()).then(data => {
            if(!data.error) updateEvalBar(data.cp, data.mate);
        }).catch(() => {});
    }
}

// ── PGN Setup & General ───────────────────────────────────────────────
function getPlayersFromPGN(pgn) {
    const wMatch = pgn.match(/\[White\s+"([^"]+)"\]/i);
    const bMatch = pgn.match(/\[Black\s+"([^"]+)"\]/i);
    return {
        white: (wMatch && wMatch[1] && wMatch[1] !== '?') ? wMatch[1] : 'White',
        black: (bMatch && bMatch[1] && bMatch[1] !== '?') ? bMatch[1] : 'Black'
    };
}

// ── Progress polling (#10) ────────────────────────────────────────────
function startProgressPolling() {
    window.currentPgnForPolling = document.getElementById('pgn-input').value.trim();
    const depth = parseInt(document.getElementById('depth-select').value);

    progressInterval = setInterval(() => {
        fetch('/analyse_progress')
        .then(r => r.json())
        .then(data => {
            const pct = data.total > 0 ? Math.round((data.done / data.total) * 100) : 0;
            const label = data.total > 0
                ? `Analysing move ${data.done} of ${data.total}…`
                : 'Starting Stockfish…';

            document.getElementById('prog-bar-fill').style.width = pct + '%';
            document.getElementById('analyze-step-text').textContent = label;
            setStatus(label);

            if (data.status === 'done' || data.status === 'error') {
                stopProgressPolling();

                const s1 = document.getElementById('step-parse');
                const s2 = document.getElementById('step-engine');
                const s3 = document.getElementById('step-analyze');
                const pBarFill = document.getElementById('prog-bar-fill');
                const progBox = document.getElementById('scout-progress');

                if (s1 && s2 && s3 && pBarFill) {
                    s1.className = 'prog-step done';
                    s2.className = 'prog-step done';
                    s3.className = 'prog-step done';
                    pBarFill.style.width = '100%';
                }

                document.getElementById('analyse-btn').disabled = false;

                setTimeout(() => {
                    if (progBox) progBox.classList.remove('visible');

                    if (data.error || data.status === 'error') {
                        setStatus('Error: ' + (data.error || 'Analysis failed'));
                        return;
                    }

                    try { sessionStorage.setItem('ghost_ai_analysis_cache', JSON.stringify({ pgn: window.currentPgnForPolling, depth, data, timestamp: Date.now() })); } catch(e) {}
                    renderAnalysisData(data, window.currentPgnForPolling);
                }, 500);
            }
        })
        .catch(() => {});
    }, 800);
}

function stopProgressPolling() {
    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

// ── Clear / Stop ──────────────────────────────────────────────────────
function clearAnalysis() {
    if (analyzeAbortController) {
        analyzeAbortController.abort();
        analyzeAbortController = null;
    }
    stopProgressPolling();
    clearTimeout(timeout1);
    clearTimeout(timeout2);

    document.getElementById('pgn-input').value = '';
    document.getElementById('scout-progress').classList.remove('visible');
    document.getElementById('analysis-area').style.display = 'none';
    document.getElementById('analyse-btn').disabled = false;
    setStatus('PGN cleared. Ready for new analysis.');
}

// ── Analyse ───────────────────────────────────────────────────────────
function startAnalysis() {
    const pgn   = document.getElementById('pgn-input').value.trim();
    const depth = parseInt(document.getElementById('depth-select').value);

    if (!pgn) { setStatus('Please paste a PGN first.'); return; }

    const cacheKey = 'ghost_ai_analysis_cache';
    try {
        const cached = JSON.parse(sessionStorage.getItem(cacheKey) || 'null');
        if (cached && cached.pgn === pgn && cached.depth === depth &&
            (Date.now() - cached.timestamp) < 24 * 3600 * 1000) {
            setStatus('Loaded from cache ⚡');
            renderAnalysisData(cached.data, pgn);
            return;
        }
    } catch(e) {}

    if (analyzeAbortController) {
        analyzeAbortController.abort();
    }
    analyzeAbortController = new AbortController();
    const signal = analyzeAbortController.signal;

    document.getElementById('analyse-btn').disabled = true;
    const progBox = document.getElementById('scout-progress');
    const s1 = document.getElementById('step-parse');
    const s2 = document.getElementById('step-engine');
    const s3 = document.getElementById('step-analyze');
    const pBarWrap = document.getElementById('prog-bar-wrap');
    const pBarFill = document.getElementById('prog-bar-fill');

    s1.className = 'prog-step active';
    s2.className = 'prog-step';
    s3.className = 'prog-step';
    pBarWrap.classList.remove('visible');
    pBarFill.style.width = '0%';
    document.getElementById('analyze-step-text').textContent = 'Analysing Moves';
    progBox.classList.add('visible');
    setStatus('Stockfish is thinking…');

    timeout1 = setTimeout(() => { s1.className = 'prog-step done'; s2.className = 'prog-step active'; }, 300);
    timeout2 = setTimeout(() => {
        s2.className = 'prog-step done';
        s3.className = 'prog-step active';
        pBarWrap.classList.add('visible');
    }, 300);

    startProgressPolling();

    fetch('/analyse', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ pgn, depth }),
        signal:  signal
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            clearTimeout(timeout1); clearTimeout(timeout2);
            stopProgressPolling();
            document.getElementById('analyse-btn').disabled = false;
            progBox.classList.remove('visible');
            setStatus('Error: ' + data.error);
        }
    })
    .catch(err => {
        if (err.name === 'AbortError') return;

        clearTimeout(timeout1); clearTimeout(timeout2);
        stopProgressPolling();
        document.getElementById('analyse-btn').disabled = false;
        progBox.classList.remove('visible');
        setStatus('Network error: ' + err.message);
    });
}

// ── Render analysis ───────────────────────────────────────────────────
function renderAnalysisData(data, pgn) {
    moves = data.moves;
    setStatus('Analysis complete — ' + moves.length + ' moves.');
    buildMoveList();
    buildAccuracySummary();

    const orientation = detectOrientation(pgn);
    const players     = getPlayersFromPGN(pgn);

    if (orientation === 'white') {
        document.getElementById('top-player').textContent    = players.black + ' (Black)';
        document.getElementById('bottom-player').textContent = players.white + ' (White)';
    } else {
        document.getElementById('top-player').textContent    = players.white + ' (White)';
        document.getElementById('bottom-player').textContent = players.black + ' (Black)';
    }

    document.getElementById('white-acc-name').textContent = players.white + ' (White)';
    document.getElementById('black-acc-name').textContent = players.black + ' (Black)';

    initBoard(orientation);
    const isMobile = window.innerWidth <= 900;
    document.getElementById('analysis-area').style.display = isMobile ? 'block' : 'flex';
    goToMove(-1);
}

function detectOrientation(pgn) {
    if (/\[White\s+"Human"\]/i.test(pgn)) return 'white';
    if (/\[Black\s+"Human"\]/i.test(pgn)) return 'black';
    return 'white';
}

// ── Navigation ────────────────────────────────────────────────────────
function goToMove(idx) {
    idx = Math.max(-1, Math.min(idx, moves.length - 1));
    curIdx = idx;

    clearSelectionHighlights();
    document.querySelectorAll('.square-55d63').forEach(sq => sq.classList.remove('last-move-from', 'last-move-to'));

    if (idx === -1) {
        if (moves.length > 0 && moves[0].fen_before) {
            board.position(moves[0].fen_before, false);
            exploreGame.load(moves[0].fen_before);
        } else {
            board.position('start', false);
            exploreGame.reset();
        }
        clearMoveInfo();
        updateEvalBar(0, null);
    } else {
        const m = moves[idx];
        board.position(m.fen_after, false);
        exploreGame.load(m.fen_after);
        showMoveInfo(m);
        updateEvalBar(m.score_cp, m.score_mate);
    }

    updateCheckHighlight(exploreGame);

    document.querySelectorAll('.move-cell').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
    });

    ['move-list', 'move-list-mobile'].forEach(listId => {
        const container = document.getElementById(listId);
        if (!container) return;
        const activeEl = container.querySelector('.move-cell.active');
        if (!activeEl) return;
        const cr = container.getBoundingClientRect();
        const er = activeEl.getBoundingClientRect();
        if (container.scrollWidth > container.clientWidth) {
            const left = er.left - cr.left + container.scrollLeft;
            const right = left + activeEl.offsetWidth;
            if (left < container.scrollLeft) {
                container.scrollLeft = left - 8;
            } else if (right > container.scrollLeft + container.clientWidth) {
                container.scrollLeft = right - container.clientWidth + 8;
            }
        } else {
            const top = er.top - cr.top + container.scrollTop;
            const bot = top + activeEl.offsetHeight;
            if (top < container.scrollTop) {
                container.scrollTop = top - 8;
            } else if (bot > container.scrollTop + container.clientHeight) {
                container.scrollTop = bot - container.clientHeight + 8;
            }
        }
    });
    updateNavButtons();
}

function updateNavButtons() {
    document.getElementById('btn-first').disabled = (curIdx <= -1);
    document.getElementById('btn-prev').disabled  = (curIdx <= -1);
    document.getElementById('btn-next').disabled  = (curIdx >= moves.length - 1);
    document.getElementById('btn-last').disabled  = (curIdx >= moves.length - 1);
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft')  goToMove(curIdx - 1);
    if (e.key === 'ArrowRight') goToMove(curIdx + 1);
    if (e.key === 'Home')       goToMove(-1);
    if (e.key === 'End')        goToMove(moves.length - 1);
});

function formatSan(m) {
    if (m.classification === 'brilliant') return m.move_san + '!!';
    if (m.classification === 'great')     return m.move_san + '!';
    if (m.classification === 'blunder')   return m.move_san + '??';
    if (m.classification === 'mistake')   return m.move_san + '?';
    if (m.classification === 'inaccuracy')return m.move_san + '⁈';
    return m.move_san;
}

function showMoveInfo(m) {
    document.getElementById('cur-move-san').textContent = formatSan(m);
    const pill = document.getElementById('cur-classification');
    pill.textContent  = m.classification.toUpperCase();
    pill.className    = 'classification-pill';
    pill.style.background = 'transparent';
    pill.style.border     = 'none';
    pill.style.color      = `var(--${m.classification})`;

    const hint = document.getElementById('best-hint');
    if (!['best','brilliant','great','excellent'].includes(m.classification) && m.best_san) {
        hint.style.display = 'block';
        document.getElementById('best-san-label').textContent = m.best_san;
    } else {
        hint.style.display = 'none';
    }
}

function clearMoveInfo() {
    document.getElementById('cur-move-san').textContent   = '—';
    const pill = document.getElementById('cur-classification');
    pill.textContent = '';
    pill.className   = 'classification-pill';
    pill.style.border = 'none';
    document.getElementById('best-hint').style.display = 'none';
}

// ── Eval bar ──────────────────────────────────────────────────────────
function updateEvalBar(cp, mate) {
    let whiteFrac = 0.5, scoreText = '0.0';

    if (mate !== null && mate !== undefined) {
        const isWhiteWinning = mate > 0 || cp > 0;
        whiteFrac = isWhiteWinning ? 0.97 : 0.03;
        scoreText = isWhiteWinning ? 'M' + Math.abs(mate) : '-M' + Math.abs(mate);
    } else if (cp !== null && cp !== undefined) {
        const clamped = Math.max(-800, Math.min(800, cp));
        whiteFrac = (clamped + 800) / 1600;
        scoreText = cp >= 0 ? '+' + (cp / 100).toFixed(1) : (cp / 100).toFixed(1);
    }

    const dBlack = document.getElementById('eval-black');
    const dWhite = document.getElementById('eval-white');
    const dLabel = document.getElementById('eval-score-label');
    if (dBlack) dBlack.style.flex = (1 - whiteFrac).toString();
    if (dWhite) dWhite.style.flex = whiteFrac.toString();
    if (dLabel) dLabel.textContent = scoreText;

    const mBlack = document.getElementById('eval-black-mobile');
    const mWhite = document.getElementById('eval-white-mobile');
    const mLabel = document.getElementById('eval-score-label-mobile');
    if (mBlack) { mBlack.style.width = Math.round((1 - whiteFrac) * 100) + '%'; mBlack.style.flex = 'none'; }
    if (mWhite) { mWhite.style.flex = '1'; }
    if (mLabel) mLabel.textContent = scoreText;
}

// ── Move list ─────────────────────────────────────────────────────────
function buildMoveList() {
    const containers = [
        document.getElementById('move-list'),
        document.getElementById('move-list-mobile')
    ].filter(Boolean);

    containers.forEach(container => {
        container.innerHTML = '';
        for (let i = 0; i < moves.length; i += 2) {
            const row = document.createElement('div');
            row.className = 'move-row';
            const num = document.createElement('div');
            num.className   = 'move-num';
            num.textContent = (i / 2 + 1) + '.';
            row.appendChild(num);
            row.appendChild(makeMoveCell(i));
            if (i + 1 < moves.length) row.appendChild(makeMoveCell(i + 1));
            else row.appendChild(document.createElement('div'));
            container.appendChild(row);
        }
    });
}

function makeMoveCell(idx) {
    const m    = moves[idx];
    const cell = document.createElement('div');
    cell.className   = 'move-cell';
    cell.dataset.idx = idx;

    const dot = document.createElement('div');
    dot.className = 'move-dot dot-' + m.classification;
    dot.style.background = `var(--${m.classification})`;

    const text = document.createElement('span');
    text.textContent = formatSan(m);

    cell.appendChild(dot);
    cell.appendChild(text);
    cell.addEventListener('click', () => goToMove(idx));
    return cell;
}

// ── Accuracy summary with % score ─────────────────────────────────────
function buildAccuracySummary() {
    const cats  = ['brilliant','great','best','excellent','good','inaccuracy','miss','mistake','blunder'];
    const icons = { brilliant:'!!', great:'!', best:'★', excellent:'✦', good:'✔', inaccuracy:'⁈', miss:'✖', mistake:'?', blunder:'??' };
    const weights = { brilliant:100, great:100, best:100, excellent:95, good:85, inaccuracy:60, miss:40, mistake:30, blunder:0 };

    function countSide(sideIdx) {
        const counts = {};
        cats.forEach(c => counts[c] = 0);
        moves.forEach((m, i) => { if (i % 2 === sideIdx) counts[m.classification]++; });
        return counts;
    }

    function calcAccuracy(counts) {
        let total = 0, score = 0;
        cats.forEach(c => {
            total += counts[c];
            score += counts[c] * weights[c];
        });
        return total > 0 ? Math.round(score / total) : 0;
    }

    function renderSide(countId, pctId, barId, counts) {
        const pct = calcAccuracy(counts);
        [pctId, pctId + '-mobile'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.textContent = pct + '%';
        });
        [barId, barId + '-mobile'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.width = pct + '%';
        });
        [countId, countId + '-mobile'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = '';
            cats.forEach(c => {
                if (counts[c] === 0) return;
                const pill = document.createElement('span');
                pill.className = 'acc-pill';
                pill.innerHTML = `<span class="icon-badge icon-${c}">${icons[c]}</span><span class="acc-count">${counts[c]}</span><span style="text-transform:capitalize">${c}</span>`;
                el.appendChild(pill);
            });
        });
    }

    renderSide('white-counts', 'white-acc-pct', 'white-acc-bar', countSide(0));
    renderSide('black-counts', 'black-acc-pct', 'black-acc-bar', countSide(1));
    document.getElementById('accuracy-card').style.display = '';
}

// ── File upload ───────────────────────────────────────────────────────
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.pgn')) {
        setStatus('Error: Only .pgn files are allowed.');
        event.target.value = '';
        return;
    }
    const reader = new FileReader();
    reader.onload  = e => { document.getElementById('pgn-input').value = e.target.result; setStatus('File loaded! Ready to analyse.'); event.target.value = ''; };
    reader.onerror = () => setStatus('Error reading file.');
    reader.readAsText(file);
}

function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

// ── Auto-fill on load ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    tryLocalStorage();
});

function tryLocalStorage() {
    try {
        const stored = localStorage.getItem('ghost_ai_pgn_transfer');
        if (stored) {
            document.getElementById('pgn-input').value = stored;
            localStorage.removeItem('ghost_ai_pgn_transfer');
            setStatus('Game loaded — click Analyse to begin.');
            startAnalysis();
            return;
        }
    } catch(e) {}
    const pgn = new URLSearchParams(window.location.search).get('pgn');
    if (pgn) {
        document.getElementById('pgn-input').value = decodeURIComponent(pgn);
        setStatus('Game loaded — click Analyse to begin.');
        startAnalysis();
    }
}
</script>
