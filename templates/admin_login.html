<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Hub — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --border: #222;
    --gold: #c9a84c;
    --gold-dim: #7a6030;
    --text: #e0e0e0;
    --text-dim: #666;
    --danger: #c0392b;
  }
  html, body { height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: var(--text); }
  body { display: flex; align-items: center; justify-content: center; }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(201,168,76,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(201,168,76,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .box {
    position: relative; z-index: 1;
    width: 360px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    box-shadow: 0 24px 80px rgba(0,0,0,.8);
  }
  .crown { font-size: 32px; display: block; text-align: center; margin-bottom: 16px; }
  h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 16px;
    letter-spacing: 4px;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .sub { font-size: 11px; color: var(--text-dim); text-align: center; letter-spacing: 1px; margin-bottom: 32px; }
  label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; display: block; margin-bottom: 8px; text-transform: uppercase; }
  input[type=password] {
    width: 100%; padding: 12px 14px;
    background: #0d0d0d; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    outline: none; transition: border-color .2s;
    letter-spacing: 3px;
  }
  input[type=password]:focus { border-color: var(--gold-dim); }
  button {
    margin-top: 20px; width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 6px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 13px; letter-spacing: 3px;
    cursor: pointer; transition: background .2s, box-shadow .2s;
    text-transform: uppercase;
  }
  button:hover { background: rgba(201,168,76,.08); box-shadow: 0 0 20px rgba(201,168,76,.1); }
  .error {
    margin-top: 16px; padding: 10px 14px;
    background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.3);
    border-radius: 6px; font-size: 12px; color: #e74c3c; text-align: center;
  }
</style>
</head>
<body>
<div class="box">
  <span class="crown">♛</span>
  <h1>Chess Hub</h1>
  <p class="sub">Admin Access</p>
  <form method="POST" action="/admin/login">
    <label>Password</label>
    <input type="password" name="password" autofocus autocomplete="current-password" placeholder="••••••••">
    <button type="submit">Enter</button>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </form>
</div>
</body>
</html>
